<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO KICKS - Sales + CRM</title>
<style>
  :root{
    --bg:#F8F7F4;
    --bg2:#FFFFFF;
    --card:#FFFFFF;
    --border:#E5E2DB;
    --text:#1A1A1A;
    --muted:#6B7280;
    --accent:#111827;
    --green:#10B981;
    --green-bg:#ECFDF5;
    --red:#EF4444;
    --red-bg:#FEF2F2;
    --blue:#3B82F6;
    --blue-bg:#EFF6FF;
    --yellow:#F59E0B;
    --yellow-bg:#FFFBEB;
    --purple:#8B5CF6;
    --purple-bg:#F5F3FF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  .app{display:flex;flex-direction:column;min-height:100vh}
  /* NAV */
  #mainNav{background:var(--accent);padding:0 16px;display:flex;align-items:center;gap:4px;height:48px;overflow-x:auto}
  #mainNav .logo{color:#fff;font-weight:800;font-size:15px;letter-spacing:.5px;margin-right:16px;white-space:nowrap;display:flex;align-items:center;gap:8px}
  #mainNav .logo img{height:28px;width:28px;border-radius:4px}
  .nav-tab{background:none;border:none;color:rgba(255,255,255,.65);padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;transition:all .15s}
  .nav-tab:hover{color:#fff;background:rgba(255,255,255,.1)}
  .nav-tab.on{color:#fff;background:rgba(255,255,255,.18)}
  /* CONTENT */
  #mainContent{flex:1;padding:20px;max-width:1400px;width:100%;margin:0 auto}
  /* CARDS */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
  .card-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
  /* KPI ROW */
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
  .kpi-val{font-size:28px;font-weight:800;color:var(--accent)}
  .kpi-label{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500}
  /* TABLE */
  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th{padding:10px 12px;text-align:left;font-weight:600;color:var(--muted);border-bottom:2px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
  .tbl tr:hover td{background:#f9f9f7}
  /* BADGES */
  .b{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
  .bg{background:var(--green-bg);color:var(--green)}
  .br{background:var(--red-bg);color:var(--red)}
  .bb{background:var(--blue-bg);color:var(--blue)}
  .by{background:var(--yellow-bg);color:var(--yellow)}
  .bp{background:var(--purple-bg);color:var(--purple)}
  .bgr{background:#F3F4F6;color:#374151}
  .br2{background:#FFF7ED;color:#EA580C}
  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#374151}
  .btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{background:var(--border)}
  .btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:16px;padding:28px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal-title{font-size:17px;font-weight:700;margin-bottom:20px}
  .modal-close{background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:18px;cursor:pointer;width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;line-height:1}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .form-row.full{grid-template-columns:1fr}
  .form-group{display:flex;flex-direction:column;gap:4px}
  .form-group label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .form-group input,.form-group select,.form-group textarea{padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;font-family:inherit;background:#fff}
  .form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(17,24,39,.08)}
  /* TOAST */
  #toastEl{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
  .toast{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:slideIn .2s ease;max-width:320px}
  .toast.ok{background:#111827;color:#fff}
  .toast.err{background:var(--red);color:#fff}
  @keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
  /* CRM specific */
  .stage-btn{padding:4px 10px;border-radius:12px;border:1px solid;font-size:11px;font-weight:700;cursor:pointer;background:none;transition:all .15s}
  .stage-btn.on{color:#fff!important;border-color:transparent!important}
  .pipeline-col{min-width:200px;background:#f9fafb;border-radius:10px;padding:12px}
  .pipeline-col h4{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .lead-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:box-shadow .15s}
  .lead-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .note-item{padding:10px 12px;background:#f9fafb;border-radius:8px;margin-bottom:8px;border-left:3px solid var(--purple)}
  .note-text{font-size:13px;color:var(--text)}
  .note-meta{font-size:11px;color:var(--muted);margin-top:3px}
  /* SEARCH/FILTER BAR */
  .crm-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .crm-search{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none}
  .crm-search:focus{border-color:var(--accent)}
  /* LOADING */
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* SYNC badge */
  .sync-badge{font-size:11px;color:var(--green);background:var(--green-bg);padding:3px 8px;border-radius:10px;font-weight:600}
  .unsync-badge{font-size:11px;color:var(--yellow);background:var(--yellow-bg);padding:3px 8px;border-radius:10px;font-weight:600}
  @media(max-width:600px){
    #mainContent{padding:12px}
    .form-row{grid-template-columns:1fr}
    .kpi-row{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>

<script>

var SID = "1Ctv4JwJDc8MnIjp4B6_ekYI0WjqMgprPOB0ceh9lEAs";

// ─── BOOT ──────────────────────────────────────────────────────────────────
function boot(){
  sL('Conectando...', 20);
  rl();

function rl(){
  var btn=document.getElementById('br');if(btn)btn.disabled=true;
  var res={},done=0,ks=['d','v','c','b'];
  ks.forEach(function(k){
    var x=new XMLHttpRequest();x.open('GET',BASE+GS[k],true);
    x.onload=function(){
      res[k]=x.status===200?x.responseText:'';done++;
      sL('Cargando...',40+done*12);
      if(done===4){
        D.k=pD(res.d);D.v=pV(res.v);D.c=pC(res.c);D.b=pB(res.b);
        if(btn)btn.disabled=false;
        renderMain();
      }
    };
    x.onerror=function(){done++;if(done===4){if(btn)btn.disabled=false;renderMain();}};
    x.send();
  });
}

function sL(msg,pct){
  document.getElementById('mainContent').innerHTML=
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px">'+
    '<div style="font-size:28px;font-weight:800;color:#111">PRO KICKS</div>'+
    '<div style="font-size:13px;color:#6b7280">'+msg+'</div>'+
    '<div style="width:200px;height:4px;background:#e5e7eb;border-radius:2px">'+
    '<div style="width:'+pct+'%;height:100%;background:#111827;border-radius:2px;transition:width .3s"></div></div></div>';
}

// ─── PARSE FUNCTIONS ───────────────────────────────────────────────────────
function pcsv(raw){
  if(!raw)return[];
  try{
    var m=raw.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if(!m)return[];
    var obj=JSON.parse(m[1]);
    var cols=obj.table.cols.map(function(c){return c.label||c.id;});
    return (obj.table.rows||[]).map(function(r){
      var o={};
      cols.forEach(function(c,i){o[c]=r.c&&r.c[i]?r.c[i].v:'';});
      return o;
    });
  }catch(e){return[];}
}

function pN(v){return v===null||v===undefined||v===''?0:Number(String(v).replace(/[^0-9.-]/g,''))||0;}
function fmt(n){return isNaN(n)?'--':'$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fM(n){return isNaN(n)?'--':'$'+Number(n/1000000).toFixed(2)+'M';}

function pcsv(t){return t.split('\n').map(function(l){var cols=[],cur='',q=false;for(var i=0;i<l.length;i++){var c=l[i];if(c==='"'){q=!q;continue;}if(c===','&&!q){cols.push(cur.trim());cur='';continue;}if(c==='\r')continue;cur+=c;}cols.push(cur.trim());return cols;});}
function pN(v){var s=String(v||'').replace(/\$/g,'').replace(/\s/g,'').trim();if(!s||s==='--'||s==='-')return 0;if(s.indexOf(',')>=0)return Number(s.replace(/\./g,'').replace(',','.'))||0;return Number(s)||0;}
function fmt(n){return Number(n).toLocaleString('es-MX');}
function fM(v){var n=pN(v);return n?'$'+fmt(n):'--';}
function pD(t){
  var r=pcsv(t);
  var h=r[3]||[];
  function ci(n){return h.findIndex(function(c){return String(c).trim().toUpperCase()===n.toUpperCase();});}
  var vals=r[4]||[];
  return{
    cerradas:pN(vals[ci('VENTAS CERRADAS')]||vals[1]),
    incompletas:pN(vals[ci('VENTA INCOMPLETA')]||vals[2]),
    prospeccion:pN(vals[ci('EN PROSPECCION')]||vals[3]),
    comodato:pN(vals[ci('EN COMODATO')]||vals[4]),
    totalDev:pN(vals[ci('TOTAL DEVICES')]||vals[5]),
    producidos:pN(vals[ci('TOTAL PRODUCIDOS')]||vals[6]),
    redwood:pN(vals[ci('INVENTARIO REDWOOD')]||vals[7]),
    diferencia:pN(vals[ci('DIFERENCIA')]||vals[8]),
    revenue:0,devices:0,saldo:0
  };
}
function pV(t){var rows=pcsv(t),h=rows[3]||[];function ci(n){return h.findIndex(function(c){return String(c).trim().toUpperCase()===n.toUpperCase();});}var c={cl:ci('CLIENTE / CLUB'),ct:ci('CONTACTO'),r:ci('REP'),d:ci('DEVICES'),m:ci('MONTO'),e:ci('ESTADO VENTA'),p:ci('ESTADO PAGO'),s:ci('SALDO PEND.'),en:ci('ENTREGA'),f:ci('F. ENTREGA'),c2:ci('CIUDAD'),no:ci('NOTAS')};return rows.slice(4).filter(function(r){return r[c.cl]&&r[c.cl].trim()!=='';}).map(function(r){return{cliente:r[c.cl]||'',contacto:r[c.ct]||'',rep:r[c.r]||'',devices:r[c.d]||'',monto:r[c.m]||'',estado:r[c.e]||'',pago:r[c.p]||'',saldo:r[c.s]||'',entrega:r[c.en]||'',fecha:r[c.f]||'',ciudad:r[c.c2]||'',notas:r[c.no]||''};});}
function pC(t){var rows=pcsv(t),h=rows[3]||[];function ci(n){return h.findIndex(function(c){return String(c).trim().toUpperCase()===n.toUpperCase();});}return rows.slice(4).filter(function(r){return r[ci('CLIENTE / CLUB')]&&r[ci('CLIENTE / CLUB')].trim()!=='';}).map(function(r){return{cliente:r[ci('CLIENTE / CLUB')]||'',contacto:r[ci('CONTACTO')]||'',rep:r[ci('REP')]||'',devices:r[ci('DEVICES')]||'',estado:r[ci('ESTADO')]||'',entrega:r[ci('F. ENTREGA')]||'',ciudad:r[ci('CIUDAD')]||''};});}
function pB(t){var rows=pcsv(t),h=rows[3]||[];function ci(n){return h.findIndex(function(c){return String(c).trim().toUpperCase()===n.toUpperCase();});}return rows.slice(4).filter(function(r){var c=r[ci('CLIENTE')];return c&&c.trim()!==''&&c.indexOf('TOTAL')<0;}).map(function(r){return{cliente:r[ci('CLIENTE')]||'',rep:r[ci('REP')]||'',monto:r[ci('MONTO TOTAL')]||'',saldo:r[ci('SALDO PEND.')]||'',estado:r[ci('ESTADO')]||'',accion:r[ci('ACCIÓN')]||r[ci('ACCION')]||''};});}

function pV(raw){
  var rows=pcsv(raw);
  return{rows:rows,count:rows.length};
}

function ci(v,arr){return arr.some(function(a){return String(v).toUpperCase().includes(a.toUpperCase());});}

function pC(raw){
  var rows=pcsv(raw);
  return{rows:rows,count:rows.length};
}

function ci(v,arr){return arr.some(function(a){return String(v).toUpperCase().includes(a.toUpperCase());});}

function pB(raw){
  var rows=pcsv(raw);
  return{rows:rows,count:rows.length};
}

// ─── CRM: LOAD & SAVE (V6 — Google Sheet bidireccional) ────────────────────
async function loadCRM(){
  try{
    var res=await fetch(APPS_SCRIPT_URL+'?action=leads',{redirect:'follow',mode:'cors'});
    var data=await res.json();
    if(data.ok&&Array.isArray(data.leads)){
      CRM=data.leads;
      try{localStorage.setItem('pk_crm_cache',JSON.stringify(CRM));}catch(e){}
      localStorage.removeItem('pk_crm');
      return;
    }
  }catch(e){console.warn('[CRM] offline:',e.message);}
  try{
    var cache=localStorage.getItem('pk_crm_cache');
    if(cache){CRM=JSON.parse(cache);return;}
    var legacy=localStorage.getItem('pk_crm');
    if(legacy){CRM=JSON.parse(legacy);crmMigrateLegacy();}
    else{CRM=[];}
  }catch(e){CRM=[];}
}

function saveCRM(){
  try{localStorage.setItem('pk_crm_cache',JSON.stringify(CRM));}catch(e){}
}

function genId(){return 'lead_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);}

// ─── CRM: SYNC (V6 — fetch POST) ───────────────────────────────────────────
async function syncLeadToSheet(lead){
  try{
    var p=new URLSearchParams({
      action:'lead_upsert',
      id:lead.id||'',nombre:lead.nombre||'',empresa:lead.empresa||'',
      rep:lead.rep||'',ciudad:lead.ciudad||'',tel:lead.tel||'',
      email:lead.email||'',fuente:lead.fuente||'',stage:lead.stage||'Nuevo',
      nextFollow:lead.nextFollow||'',notes:JSON.stringify(lead.notes||[]),
      createdAt:lead.createdAt||'',
      updatedAt:lead.updatedAt||new Date().toISOString().slice(0,10)
    });
    var res=await fetch(APPS_SCRIPT_URL,{method:'POST',body:p});
    var data=await res.json();
    if(!data.ok)console.warn('[CRM] sync error:',data.error);
  }catch(e){console.warn('[CRM] offline:',e.message);}
}

async function crmDeleteRemote(id){
  try{
    var p=new URLSearchParams({action:'lead_delete',id:id});
    await fetch(APPS_SCRIPT_URL,{method:'POST',body:p});
  }catch(e){}
}

async function crmMigrateLegacy(){
  var legacy=localStorage.getItem('pk_crm');
  if(!legacy)return;
  try{
    var leads=JSON.parse(legacy);
    if(!leads.length)return;
    var p=new URLSearchParams({action:'leads_sync',leads:JSON.stringify(leads)});
    var res=await fetch(APPS_SCRIPT_URL,{method:'POST',body:p});
    var data=await res.json();
    if(data.ok){localStorage.removeItem('pk_crm');toast('✅ '+data.synced+' leads migrados',3000);}
  }catch(e){}
}

// ─── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg,dur,type){
  var el=document.getElementById('toastEl');
  if(!el)return;
  var t=document.createElement('div');
  t.className='toast '+(type||'ok');
  t.textContent=msg;
  el.appendChild(t);
  setTimeout(function(){t.remove();},dur||2500);
}

// ─── ROUTING ───────────────────────────────────────────────────────────────
function switchMain(tab){
  mainTab=tab;
  var tabs=document.querySelectorAll('.nav-tab');
  tabs.forEach(function(t,i){
    t.className='nav-tab'+((['dashboard','crm','ventas','comodato','cobranza'][i]===tab)?' on':'');
  });
  renderMain();
}

function renderMain(){
  var mc=document.getElementById('mainContent');
  if(!mc)return;
  if(mainTab==='dashboard'){renderDash();}
  else if(mainTab==='crm'){renderCRM();}
  else if(mainTab==='ventas'){rV();}
  else if(mainTab==='comodato'){rC();}
  else if(mainTab==='cobranza'){rB();}
}

// ─── STAGE BADGE ───────────────────────────────────────────────────────────
var STAGE_COLORS={
  'Nuevo':'#6366F1','Contactado':'#3B82F6','Demo':'#F59E0B',
  'Propuesta':'#8B5CF6','Negociación':'#EC4899','Cerrado':'#10B981','Perdido':'#EF4444'
};
var STAGES=['Nuevo','Contactado','Demo','Propuesta','Negociación','Cerrado','Perdido'];
var FUENTES=['Referido','Instagram','Facebook','WhatsApp','Web','Evento','Otro'];
var REPS=['Sean','Otro'];

function stageBadge(s){
  var c=STAGE_COLORS[s]||'#6B7280';
  return '<span class="b" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+( s||'Nuevo')+'</span>';

function eb(v){var s=String(v||'').trim();if(s==='PAGADO')return "<span class='b bg'>"+s+"</span>";if(s==='PENDIENTE')return "<span class='b bo'>"+s+"</span>";return s?"<span class='b bgr'>"+s+"</span>":'--';}
function pb(v){var s=String(v||'').trim();if(s==='PAGADO')return "<span class='b bg'>"+s+"</span>";if(s==='PENDIENTE')return "<span class='b by'>"+s+"</span>";return s?"<span class='b bgr'>"+s+"</span>":'--';}
function nb(v){var s=String(v||'').trim();if(s==='ENTREGADO')return "<span class='b bg'>"+s+"</span>";if(s==='ENVIADO')return "<span class='b bb'>"+s+"</span>";if(s==='NO ENVIADO')return "<span class='b br2'>"+s+"</span>";return(s&&s!=='--')?"<span class='b bgr'>"+s+"</span>":'--';}
function sb(v){var s=String(v||'').trim();if(s==='ENTREGADO')return "<span class='b bg'>"+s+"</span>";if(s==='ENVIADO')return "<span class='b bb'>"+s+"</span>";if(s==='PENDIENTE')return "<span class='b by'>"+s+"</span>";return(s&&s!=='--')?"<span class='b bgr'>"+s+"</span>":'--';}

function sb2(v){var s=String(v||'').trim();if(s==='EN USO')return "<span class='b bb'>"+s+"</span>";if(s==='DEVUELTO')return "<span class='b bg'>"+s+"</span>";return s?"<span class='b bgr'>"+s+"</span>":'--';}

// ─── CRM RENDER ────────────────────────────────────────────────────────────
function renderCRM(){
  var mc=document.getElementById('mainContent');

  // Count by stage
  var counts={};
  STAGES.forEach(function(s){counts[s]=0;});
  CRM.forEach(function(l){if(counts[l.stage]!==undefined)counts[l.stage]++;});

  var filtered=CRM.filter(function(l){
    var q=(CRM_SEARCH||'').toLowerCase();
    var stageOk=!CRM_FILTER||l.stage===CRM_FILTER;
    var searchOk=!q||(l.nombre||'').toLowerCase().includes(q)||(l.empresa||'').toLowerCase().includes(q)||(l.rep||'').toLowerCase().includes(q);
    return stageOk&&searchOk;
  });

  // Sort
  filtered.sort(function(a,b){
    var av=String(a[CRM_SORT]||''),bv=String(b[CRM_SORT]||'');
    return CRM_ASC?av.localeCompare(bv):bv.localeCompare(av);
  });

  var html=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">'+
    '<h1 style="font-size:20px;font-weight:800">🎯 CRM Leads</h1>'+
    '<div style="display:flex;gap:8px;align-items:center">'+
    '<span id="crmSyncLabel" style="font-size:11px;color:#9ca3af"></span>'+
    '<button class="btn btn-secondary btn-sm" onclick="manualSync()">☁ Sync</button>'+
    '<button class="btn btn-primary" onclick="showAddModal()">+ Nuevo Lead</button>'+
    '</div></div>'+
    // Stage pills
    '<div style="display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px">'+
    '<button class="stage-btn'+(CRM_FILTER===''?' on':'')+'" style="color:#374151;border-color:#d1d5db;'+(CRM_FILTER===''?'background:#374151;color:#fff;':'')+'border-radius:20px" onclick="setCrmFilter(\'\')">Todos ('+CRM.length+')</button>'+
    STAGES.map(function(s){
      var c=STAGE_COLORS[s]||'#6B7280';
      var on=CRM_FILTER===s;
      return '<button class="stage-btn" style="color:'+c+';border-color:'+c+'60;'+(on?'background:'+c+';color:#fff;':'')+'" onclick="setCrmFilter(\''+s+'\')">'+s+' ('+counts[s]+')</button>';
    }).join('')+
    '</div>'+
    // Toolbar
    '<div class="crm-toolbar">'+
    '<input class="crm-search" placeholder="🔍 Buscar..." value="'+(CRM_SEARCH||'')+'" oninput="setCrmSearch(this.value)"/>'+
    '</div>';

  // Table
  if(filtered.length===0){
    html+='<div class="card" style="text-align:center;padding:48px;color:var(--muted)">'+
      (CRM.length===0?'<div style="font-size:32px;margin-bottom:12px">🎯</div><div style="font-weight:600;font-size:16px;margin-bottom:8px">Sin leads aún</div><div style="font-size:13px">Agrega tu primer lead con el botón de arriba</div>':
      'Sin resultados para "'+CRM_SEARCH+'"')+
    '</div>';
  } else {
    html+='<div class="card" style="padding:0;overflow:hidden">'+
      '<table class="tbl">'+
      '<thead><tr>'+
      '<th>Nombre / Empresa</th><th>Rep</th><th>Stage</th><th>Siguiente</th><th>Fuente</th><th style="width:80px">Acc</th>'+
      '</tr></thead><tbody>'+
      filtered.map(function(l){
        var overdue=l.nextFollow&&l.nextFollow<new Date().toISOString().slice(0,10);
        return '<tr>'+
          '<td><div style="font-weight:600">'+(l.nombre||'—')+'</div>'+
          '<div style="font-size:11px;color:var(--muted)">'+(l.empresa||'')+(l.ciudad?' · '+l.ciudad:'')+'</div>'+
          (l.tel?'<div style="font-size:11px;color:var(--muted)">'+l.tel+'</div>':'')+
          '</td>'+
          '<td style="color:var(--muted)">'+(l.rep||'—')+'</td>'+
          '<td>'+stageBadge(l.stage)+'</td>'+
          '<td style="font-size:12px;color:'+(overdue?'var(--red)':'var(--muted)') +'">'+( l.nextFollow||'—')+'</td>'+
          '<td style="font-size:12px;color:var(--muted)">'+(l.fuente||'—')+'</td>'+
          '<td>'+
          '<button class="btn btn-secondary btn-sm" onclick="openLead(\''+l.id+'\')">Ver</button>'+
          '</td>'+
          '</tr>';
      }).join('')+
      '</tbody></table></div>';
  }

  mc.innerHTML=html;

  // Update sync label
  var cached=localStorage.getItem('pk_crm_synced');
  var lbl=document.getElementById('crmSyncLabel');
  if(lbl&&cached){
    var d=new Date(cached);
    lbl.textContent='Sync '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  }
}

// ─── CRM: OPEN LEAD MODAL ──────────────────────────────────────────────────
function openLead(id){
  var l=CRM.find(function(x){return x.id===id;});
  if(!l)return;
  var mc=document.getElementById('modalContainer');
  var notes=(l.notes||[]);
  var stagesBtns=STAGES.map(function(s){
    var c=STAGE_COLORS[s]||'#6B7280';
    var on=l.stage===s;
    return '<button class="stage-btn" style="color:'+(on?'#fff':c)+';border-color:'+c+'60;background:'+(on?c:'none')+'" onclick="changeStage(\''+id+'\',\''+s+'\')">'+s+'</button>';
  }).join('');

  mc.innerHTML='<div class="modal-overlay open" onclick="if(event.target===this)closeModal()">'+
    '<div class="modal">'+
    '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px">'+
    '<div>'+
    '<div style="font-size:18px;font-weight:800">'+(l.nombre||'Lead')+'</div>'+
    '<div style="font-size:13px;color:var(--muted)">'+(l.empresa||'')+(l.ciudad?' · '+l.ciudad:'')+'</div>'+
    '</div>'+
    '<button class="modal-close" onclick="closeModal()">×</button>'+
    '</div>'+
    // Stage buttons
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">'+stagesBtns+'</div>'+
    // Info grid
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;font-size:13px">'+
    '<div><span style="color:var(--muted);font-size:11px">REP</span><div style="font-weight:600">'+(l.rep||'—')+'</div></div>'+
    '<div><span style="color:var(--muted);font-size:11px">FUENTE</span><div style="font-weight:600">'+(l.fuente||'—')+'</div></div>'+
    '<div><span style="color:var(--muted);font-size:11px">TEL</span><div>'+(l.tel||'—')+'</div></div>'+
    '<div><span style="color:var(--muted);font-size:11px">EMAIL</span><div>'+(l.email||'—')+'</div></div>'+
    '<div><span style="color:var(--muted);font-size:11px">SIGUIENTE SEGUIMIENTO</span>'+
    '<input type="date" value="'+(l.nextFollow||'')+'" onchange="updateFollow(\''+id+'\',this.value)" style="display:block;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;margin-top:2px"></div>'+
    '</div>'+
    // Notes
    '<div style="border-top:1px solid var(--border);padding-top:14px">'+
    '<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:10px">Notas ('+notes.length+')</div>'+
    '<div id="notesList">'+
    (notes.length?notes.slice().reverse().map(function(n){
      return '<div class="note-item"><div class="note-text">'+n.text+'</div><div class="note-meta">'+n.rep+' · '+n.date+'</div></div>';
    }).join(''):'<div style="color:var(--muted);font-size:13px">Sin notas aún</div>')+
    '</div>'+
    '<div style="display:flex;gap:8px;margin-top:12px">'+
    '<input id="ni_text" type="text" placeholder="Agregar nota..." class="crm-search" style="flex:1" onkeydown="if(event.key===\'Enter\')addNote(\''+id+'\')"/>'+
    '<button class="btn btn-primary btn-sm" onclick="addNote(\''+id+'\')">+</button>'+
    '</div>'+
    '</div>'+
    // Actions
    '<div style="display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">'+
    '<button class="btn btn-secondary btn-sm" onclick="manualSync()">☁ Sync</button>'+
    '<button class="btn btn-sm" style="background:var(--red-bg);color:var(--red)" onclick="deleteLead(\''+id+'\')">🗑 Eliminar</button>'+
    '</div>'+
    '</div></div>';
}

function closeModal(){
  var mc=document.getElementById('modalContainer');
  if(mc)mc.innerHTML='';
}

// ─── CRM: ACTIONS ──────────────────────────────────────────────────────────
function changeStage(id,stage){
  var l=CRM.find(function(x){return x.id===id;});
  if(!l)return;
  l.stage=stage;
  l.updatedAt=new Date().toISOString().slice(0,10);
  saveCRM();
  syncLeadToSheet(l);
  openLead(id);
  renderCRM();
}

function updateFollow(id,val){
  var l=CRM.find(function(x){return x.id===id;});
  if(!l)return;
  l.nextFollow=val;
  l.updatedAt=new Date().toISOString().slice(0,10);
  saveCRM();
  syncLeadToSheet(l);
}

function addNote(id){
  var l=CRM.find(function(x){return x.id===id;});
  if(!l)return;
  var t=(document.getElementById('ni_text')||{}).value||'';
  if(!t.trim())return;
  if(!l.notes)l.notes=[];
  l.notes.push({text:t,date:new Date().toISOString().slice(0,10),rep:'Yo'});
  l.updatedAt=new Date().toISOString().slice(0,10);
  saveCRM();
  syncLeadToSheet(l);
  document.getElementById('ni_text').value='';
  openLead(id);
}

function deleteLead(id){
  if(!confirm('¿Eliminar este lead?'))return;
  CRM=CRM.filter(function(x){return x.id!==id;});
  saveCRM();
  crmDeleteRemote(id);
  closeModal();
  renderCRM();
}

// ─── MANUAL SYNC (V6) ──────────────────────────────────────────────────────
async function manualSync(){
  toast('Sincronizando…',1500);
  await loadCRM();
  localStorage.setItem('pk_crm_synced', new Date().toISOString());
  renderCRM();
  toast('✅ '+CRM.length+' leads',3000);
}

function saveNewLead(){
  var nombre=document.getElementById('nf_nombre')?document.getElementById('nf_nombre').value.trim():'';
  if(!nombre){alert('El nombre es requerido');return;}
  var lead={
    id:genId(),nombre:nombre,
    empresa:document.getElementById('nf_empresa')?document.getElementById('nf_empresa').value:'',
    rep:document.getElementById('nf_rep')?document.getElementById('nf_rep').value:'',
    ciudad:document.getElementById('nf_ciudad')?document.getElementById('nf_ciudad').value:'',
    tel:document.getElementById('nf_tel')?document.getElementById('nf_tel').value:'',
    email:document.getElementById('nf_email')?document.getElementById('nf_email').value:'',
    fuente:document.getElementById('nf_fuente')?document.getElementById('nf_fuente').value:'',
    stage:document.getElementById('nf_stage')?document.getElementById('nf_stage').value:'Nuevo',
    nextFollow:document.getElementById('nf_follow')?document.getElementById('nf_follow').value:'',
    notes:[],
    createdAt:new Date().toISOString().slice(0,10),
    updatedAt:new Date().toISOString().slice(0,10)
  };
  CRM.unshift(lead);
  saveCRM();
  syncLeadToSheet(lead).then(function(){
    toast('✅ Lead guardado y sincronizado',3000);
  });
  setCrmView('list');
  switchMain('crm');
}
